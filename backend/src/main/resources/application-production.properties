# ====== APPLICATION CONFIGURATION ======
spring.application.name=converter-backend
server.port=${SERVER_PORT:8081}
spring.profiles.active=production

# ====== DATABASE CONFIGURATION ======
# Production: Use environment variables or external config
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ====== ACTUATOR CONFIGURATION ======
# Enable health endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never

# Health check settings
management.health.db.enabled=true
management.health.datasources.enabled=true
management.health.ping.enabled=true

# Security for actuator endpoints
management.endpoints.web.access.default=deny
management.endpoint.health.access=read_only

# ====== ERROR HANDLING ======
# Ensure default /error endpoint never leaks details in production
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# ====== JPA / HIBERNATE CONFIGURATION ======
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ====== FLYWAY CONFIGURATION ======
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ====== LOGGING CONFIGURATION ======
# Production profile - minimal logging for performance and security
logging.level.org.springframework=WARN
logging.level.com.converter=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springdoc=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# Production logging patterns
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log file configuration for production
logging.file.name=logs/converter-backend.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB

# ====== JWT CONFIGURATION ======
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ====== EMAIL CONFIGURATION ======
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST}

# ====== PAYPAL CONFIGURATION ======
paypal.client.id=${PAYPAL_CLIENT_ID}
paypal.client.secret=${PAYPAL_CLIENT_SECRET}
paypal.mode=${PAYPAL_MODE:production}
paypal.return.url=${PAYPAL_RETURN_URL}
paypal.cancel.url=${PAYPAL_CANCEL_URL}

# ====== STRIPE CONFIGURATION ======
stripe.api.key=${STRIPE_API_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# ====== OPENAI CONFIGURATION ======
openai.api.url=${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
openai.api.key=${OPENAI_API_KEY}

# ====== FRONTEND URL CONFIGURATION ======
frontend.url=${FRONTEND_URL:https://converter-frontend-16ql.onrender.com}
frontend.cors.allowed-origins=${FRONTEND_CORS_ALLOWED_ORIGINS:https://converter-frontend-16ql.onrender.com}

# ====== PAYMENT SETTINGS ======
payment.currency.default=${PAYMENT_CURRENCY:USD}
payment.timeout.minutes=${PAYMENT_TIMEOUT:15}
payment.max.retries=${PAYMENT_MAX_RETRIES:3}
payment.cleanup.enabled=${PAYMENT_CLEANUP_ENABLED:true}
payment.cleanup.cron=${PAYMENT_CLEANUP_CRON:0 0 2 * * ?}



spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000