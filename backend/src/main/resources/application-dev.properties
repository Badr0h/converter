# ====== DEVELOPMENT PROFILE CONFIGURATION ======
# This file is automatically loaded when spring.profiles.active=dev

# ====== DATABASE CONFIGURATION ======
# Use local PostgreSQL for development
DATABASE_URL=jdbc:postgresql://db:5432/unit_conversion?useSSL=false&serverTimezone=UTC
spring.datasource.username=converter_admin
spring.datasource.password=converter112233

# ====== JPA / HIBERNATE CONFIGURATION ======
# Enable SQL logging for development debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ====== LOGGING CONFIGURATION ======
# Verbose logging for development
logging.level.org.springframework=INFO
logging.level.com.converter=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springdoc=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Development logging patterns
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ====== DEVELOPMENT-SPECIFIC SETTINGS ======
# Enable hot reload for development
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Enable detailed error pages
server.error.include-message=always
server.error.include-binding-errors=always

# ====== FRONTEND URL CONFIGURATION ======
frontend.url=http://localhost:4200
frontend.cors.allowed-origins=http://localhost:4200,http://localhost:8081



# Activation des devtools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/java