# ====== APPLICATION CONFIGURATION ======
spring.application.name=converter-backend
server.port=${SERVER_PORT:8081}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ====== DATABASE CONFIGURATION ======
spring.datasource.url=jdbc:postgresql://localhost:5432/unit_conversion?useSSL=false&serverTimezone=UTC
spring.datasource.username=converter_admin
spring.datasource.password=converter112233
spring.datasource.driver-class-name=org.postgresql.Driver

# ====== JPA / HIBERNATE CONFIGURATION ======
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ====== FLYWAY CONFIGURATION ======
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ====== LOGGING CONFIGURATION ======
