# ====== APPLICATION CONFIGURATION ======
spring.application.name=converter-backend
server.port=${SERVER_PORT:8081}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ====== DATABASE CONFIGURATION ======
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:py_converter_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:converter_odiak}
spring.datasource.password=${DB_PASSWORD:Converter112233}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ====== JPA / HIBERNATE CONFIGURATION ======
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ====== FLYWAY CONFIGURATION ======
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ====== LOGGING CONFIGURATION ======
logging.level.org.springframework=INFO
logging.level.com.converter=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springdoc=DEBUG

# ====== JWT CONFIGURATION ======
jwt.secret=bXlTdXBlclNlY3JldEtleUZvckpXVDEyMzQ1Njc4OTAxMjM0NTY=
jwt.expiration=86400000

# ====== EMAIL CONFIGURATION ======
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}

# ====== PAYPAL CONFIGURATION ======
paypal.client.id=${PAYPAL_CLIENT_ID:your_paypal_client_id}
paypal.client.secret=${PAYPAL_CLIENT_SECRET:your_paypal_client_secret}
paypal.mode=${PAYPAL_MODE:sandbox}
paypal.return.url=${PAYPAL_RETURN_URL:http://localhost:4200/payment-success}
paypal.cancel.url=${PAYPAL_CANCEL_URL:http://localhost:4200/payment-cancel}

# ====== STRIPE CONFIGURATION ======
stripe.api.key=${STRIPE_API_KEY:your-stripe-api-key}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:your-stripe-webhook-secret}

# ====== OPENAI CONFIGURATION ======
openai.api.url=${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
openai.api.key=${OPENAI_API_KEY:your-openai-api-key-here}

# ====== PAYMENT SETTINGS ======
payment.currency.default=${PAYMENT_CURRENCY:USD}
payment.timeout.minutes=${PAYMENT_TIMEOUT:15}
payment.max.retries=${PAYMENT_MAX_RETRIES:3}
payment.cleanup.enabled=${PAYMENT_CLEANUP_ENABLED:true}
payment.cleanup.cron=${PAYMENT_CLEANUP_CRON:0 0 2 * * ?}
