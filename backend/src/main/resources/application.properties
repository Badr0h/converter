# ====== APPLICATION CONFIGURATION ======
spring.application.name=converter-backend
server.port=${SERVER_PORT:8081}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:production}

# ====== DATABASE CONFIGURATION ======
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ====== JPA / HIBERNATE CONFIGURATION ======
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ====== FLYWAY CONFIGURATION ======
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true

# ====== ACTUATOR CONFIGURATION ======
# Enable health endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always

# Health check settings
management.health.db.enabled=true
management.health.datasources.enabled=true
management.health.ping.enabled=true

# Security for actuator endpoints
management.endpoints.web.access.default=deny
management.endpoint.health.access=read_only

# ====== LOGGING CONFIGURATION ======
# Default logging - minimal for production
logging.level.org.springframework=INFO
logging.level.com.converter=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springdoc=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.flywaydb=DEBUG

# Console logging pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ====== JWT CONFIGURATION ======
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ====== EMAIL CONFIGURATION ======
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST}

# ====== FRONTEND URL CONFIGURATION ======
frontend.url=${FRONTEND_URL}
frontend.cors.allowed-origins=${FRONTEND_CORS_ALLOWED_ORIGINS}

# ====== PAYPAL CONFIGURATION ======
paypal.client.id=${PAYPAL_CLIENT_ID}
paypal.client.secret=${PAYPAL_CLIENT_SECRET}
paypal.mode=${PAYPAL_MODE:sandbox}
paypal.return.url=${PAYPAL_RETURN_URL}
paypal.cancel.url=${PAYPAL_CANCEL_URL}

# ====== STRIPE CONFIGURATION ======
stripe.api.key=${STRIPE_API_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# ====== OPENAI CONFIGURATION ======
openai.api.url=${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
openai.api.key=${OPENAI_API_KEY}

# ====== PAYMENT SETTINGS ======
payment.currency.default=${PAYMENT_CURRENCY:USD}
payment.timeout.minutes=${PAYMENT_TIMEOUT:15}
payment.max.retries=${PAYMENT_MAX_RETRIES:3}
payment.cleanup.enabled=${PAYMENT_CLEANUP_ENABLED:true}
payment.cleanup.cron=${PAYMENT_CLEANUP_CRON:0 0 2 * * ?}
