<nav class="nav-header" [class.scrolled]="isScrolled">
  <div class="nav-container">
    <!-- Sophisticated Brand Identity -->
    <a routerLink="/" class="nav-logo" (click)="closeMenu()">
      <div class="logo-icon">C</div>
      <span class="logo-text">Converter</span>
    </a>

    <!-- Precision Mobile Toggle -->
    <button class="mobile-toggle" (click)="toggleMenu()" *ngIf="isAuthenticated()" aria-label="Toggle Navigation">
      <span class="toggle-icon">{{ isMenuOpen ? '✕' : '☰' }}</span>
    </button>

    <!-- Tactical Navigation Array -->
    <div class="nav-menu" [class.active]="isMenuOpen" *ngIf="isAuthenticated()">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Dashboard</a>
      <a routerLink="/conversion" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Converter</a>
      <a routerLink="/subscription/plans" routerLinkActive="active" class="nav-link" (click)="closeMenu()">Pricing</a>
      <a routerLink="/admin" routerLinkActive="active" class="nav-link admin-link" (click)="closeMenu()"
        *ngIf="isAdmin()">⚡ Admin</a>
    </div>

    <!-- User Command Module -->
    <div class="navbar-user" *ngIf="isAuthenticated()">
      <a routerLink="/profile" class="user-trigger" (click)="closeMenu()">
        <div class="user-avatar">{{ currentUser?.fullName?.charAt(0) || 'U' }}</div>
        <span class="user-name">{{ currentUser?.fullName }}</span>
      </a>
      <button class="btn btn-ghost btn-sm" (click)="logout()">Sign Out</button>
    </div>

    <!-- Guest Access Portal -->
    <div class="navbar-guest flex gap-md" *ngIf="!isAuthenticated()">
      <a routerLink="/auth/login" class="btn btn-ghost btn-sm">Sign In</a>
      <a routerLink="/auth/register" class="btn btn-primary btn-sm">Get Started</a>
    </div>
  </div>
</nav>
