<nav class="nav-header">
  <div class="nav-container">
    <!-- Logo -->
    <a routerLink="/" class="nav-logo" (click)="closeMenu()">
      <span class="logo-text">Converter</span>
    </a>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-toggle" (click)="toggleMenu()" *ngIf="isAuthenticated()">
      <span class="toggle-icon">{{ isMenuOpen ? '✕' : '☰' }}</span>
    </button>

    <!-- Navigation Links (Only show when authenticated) -->
    <div class="nav-menu" [class.active]="isMenuOpen" *ngIf="isAuthenticated()">
      <a 
        routerLink="/dashboard" 
        routerLinkActive="active"
        class="nav-link"
        (click)="closeMenu()"
      >
        Dashboard
      </a>
      <a 
        routerLink="/conversion" 
        routerLinkActive="active"
        class="nav-link"
        (click)="closeMenu()"
      >
        Convert
      </a>
      <a 
        routerLink="/subscription/plans" 
        routerLinkActive="active"
        class="nav-link"
        (click)="closeMenu()"
      >
        Plans
      </a>
    </div>

    <!-- User Menu (When authenticated) -->
    <div class="navbar-user" *ngIf="isAuthenticated()">
      <a 
        routerLink="/profile"
        class="user-info"
        (click)="closeMenu()"
      >
        <div class="user-avatar">
          <span class="user-initials">{{ currentUser?.fullName?.charAt(0) || 'U' }}</span>
        </div>
        <span class="user-name">{{ currentUser?.fullName }}</span>
      </a>
      <button class="btn btn-ghost btn-sm" (click)="logout()">
        Logout
      </button>
    </div>

    <!-- Guest Links (When NOT authenticated) -->
    <div class="navbar-guest" *ngIf="!isAuthenticated()">
      <a routerLink="/auth/login" class="btn btn-secondary btn-sm">Login</a>
      <a routerLink="/auth/register" class="btn btn-primary btn-sm">Get Started</a>
    </div>
  </div>
</nav>
