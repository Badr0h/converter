<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Mot de Passe Oublié ?</h1>
    <p class="auth-subtitle">Entrez votre email pour recevoir un lien de réinitialisation</p>

    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="alert alert-error">
      {{ errorMessage }}
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email" class="form-label">Adresse Email</label>
        <input
          type="email"
          id="email"
          class="form-input"
          formControlName="email"
          placeholder="vous@exemple.com"
          [class.is-invalid]="submitted && f['email'].errors"
        />
        <div *ngIf="submitted && f['email'].errors" class="error-message">
          <small *ngIf="f['email'].errors['required']">L'email est requis</small>
          <small *ngIf="f['email'].errors['email']">Veuillez entrer una adresse email valide</small>
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loading"
      >
        {{ loading ? 'Envoi en cours...' : 'Envoyer le lien de réinitialisation' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>
        Vous vous souvenez de votre mot de passe ?
        <a routerLink="/auth/login" class="auth-link">Se connecter</a>
      </p>
    </div>
  </div>
</div>
