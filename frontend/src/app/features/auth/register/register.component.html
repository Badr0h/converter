<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h2>Create Account</h2>
      <p>Join AI Converter and start transforming your code</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
      <!-- Full Name Field -->
      <div class="form-group">
        <label for="fullName" class="form-label">Full Name</label>
        <input type="text" id="fullName" formControlName="fullName" class="form-input"
          [class.invalid]="submitted && f['fullName']?.errors" placeholder="John Doe" />
        <div *ngIf="submitted && f['fullName']?.errors" class="invalid-feedback">
          <div *ngIf="f['fullName']?.errors?.['required']">Full Name is required</div>
        </div>
      </div>

      <!-- Email Field -->
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" formControlName="email" class="form-input"
          [class.invalid]="submitted && f['email']?.errors" placeholder="name@company.com" />
        <div *ngIf="submitted && f['email']?.errors" class="invalid-feedback">
          <div *ngIf="f['email']?.errors?.['required']">Email is required</div>
          <div *ngIf="f['email']?.errors?.['email']">Please enter a valid email</div>
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password" class="form-input"
          [class.invalid]="submitted && f['password']?.errors" placeholder="••••••••" />
        <div *ngIf="submitted && f['password']?.errors" class="invalid-feedback">
          <div *ngIf="f['password']?.errors?.['required']">Password is required</div>
        </div>

        <div class="mt-2">
          <label class="flex items-center gap-xs cursor-pointer">
            <input type="checkbox" (change)="togglePasswordVisibility()">
            <span class="text-xs text-muted">Show Password</span>
          </label>
        </div>
      </div>

      <!-- Confirm Password Field -->
      <div class="form-group">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <input type="password" id="confirmPassword" formControlName="confirmPassword" class="form-input"
          [class.invalid]="submitted && (f['confirmPassword']?.errors || registerForm.errors?.['passwordMismatch'])"
          placeholder="••••••••" />
        <div *ngIf="submitted && f['confirmPassword']?.errors" class="invalid-feedback">
          <div *ngIf="f['confirmPassword']?.errors?.['required']">Please confirm your password</div>
        </div>
        <div *ngIf="submitted && registerForm.errors?.['passwordMismatch'] && !f['confirmPassword']?.errors"
          class="invalid-feedback">
          <div>Passwords do not match</div>
        </div>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading">Creating Account...</span>
      </button>

      <!-- Login Link -->
      <div class="text-footer">
        <p>Already have an account? <a routerLink="/auth/login">Sign in</a></p>
      </div>
    </form>
  </div>
</div>
